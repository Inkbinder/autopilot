<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Autopilot Demo Todo App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: linear-gradient(180deg, #f7f7f2 0%, #efe6d6 100%);
        color: #18222f;
      }

      body {
        margin: 0;
        min-height: 100vh;

        place-items: center;

      }
    </style>
  </head>
  <body>
    <todo-app></todo-app>
    <script type="module" src="./src/todo-app.js"></script>
